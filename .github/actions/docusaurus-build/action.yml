name: 'Docusaurus Build & Deploy'
description: 'Shared build and deploy pipeline for Docusaurus sub-sites on Cloudflare Pages'

inputs:
  config-file:
    description: 'Docusaurus config file to build with'
    required: true
  project-name:
    description: 'Cloudflare Pages project name'
    required: true
  site-name:
    description: 'Human-readable site name for deploy summary'
    required: true
  deploy-url:
    description: 'Production URL for deploy summary'
    required: true
  node-memory:
    description: 'Node --max-old-space-size value'
    required: false
    default: '7168'
  preprocess-paths:
    description: 'Space-separated paths for escape-latex-braces.js preprocessing'
    required: false
    default: ''
  generate-sitemap:
    description: 'Whether to generate sitemap (true/false)'
    required: false
    default: 'false'
  create-project:
    description: 'Create Cloudflare Pages project if it does not exist'
    required: false
    default: 'false'
  allow-build-failure:
    description: 'Allow build to fail (for sites with partial SSG content)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Add swap space
      shell: bash
      run: |
        sudo swapoff -a 2>/dev/null || true
        sudo rm -f /swapfile
        sudo fallocate -l 16G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
      with:
        node-version: 22
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Preprocess MDX files
      if: inputs.preprocess-paths != ''
      shell: bash
      run: node scripts/escape-latex-braces.js ${{ inputs.preprocess-paths }}

    - name: Cache Docusaurus build
      uses: actions/cache@v4
      with:
        path: node_modules/.cache/docusaurus
        key: docusaurus-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.config-file }}

    - name: Build
      id: build
      continue-on-error: ${{ inputs.allow-build-failure == 'true' }}
      shell: bash
      run: |
        npx docusaurus build --config ${{ inputs.config-file }} 2>&1 | tee /tmp/build.log
        exit "${PIPESTATUS[0]}"
      env:
        NODE_OPTIONS: '--max-old-space-size=${{ inputs.node-memory }}'
        DISABLE_LUNR: '1'
        GENERATE_SOURCEMAP: '${{ inputs.generate-sitemap }}'
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
        BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
        CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}

    - name: Remove SSR bundle
      shell: bash
      run: rm -rf build/__server

    - name: Create Cloudflare Pages project if needed
      if: inputs.create-project == 'true'
      shell: bash
      run: |
        npx wrangler@4 pages project create ${{ inputs.project-name }} --production-branch main 2>/dev/null || true
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy to Cloudflare Pages
      id: deploy
      shell: bash
      run: npx wrangler@4 pages deploy build --project-name ${{ inputs.project-name }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deployment summary
      if: always()
      shell: bash
      run: node scripts/deploy-summary.mjs
      env:
        SITE_NAME: '${{ inputs.site-name }}'
        DEPLOY_URL: '${{ inputs.deploy-url }}'
        BUILD_DURATION: '0'
        GIT_SHA: '${{ github.sha }}'
        TRIGGER: '${{ github.event_name }}'
        DEPLOY_OUTCOME: '${{ steps.deploy.outcome }}'
