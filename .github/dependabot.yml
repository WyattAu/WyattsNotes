version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    reviewers:
      - 'WyattAu'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'deps'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    reviewers:
      - 'WyattAu'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    open-pull-requests-limit: 5
    labels:
      - 'security'
      - 'dependencies'
    commit-message:
      prefix: 'fix(deps)'
    target-branch: 'main'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'indirect'
