name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  validate:
    name: Lint & Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint . --report-unused-disable-directives --ext .js,.jsx,.ts,.tsx

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        id: build
        run: pnpm run build
        continue-on-error: true

      - name: Build timing
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "::notice::Build succeeded"
          else
            echo "::error::Build failed"
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (critical = fail)
        run: pnpm audit --audit-level=critical || true
        # npm audit endpoint retired (410). Ignore until pnpm supports the new
        # bulk advisory endpoint. Security is validated by Dependabot.

      - name: Run pnpm audit (high = warn)
        id: audit-high
        continue-on-error: true
        run: pnpm audit --audit-level=high || true

      - name: Annotate high-severity findings
        if: steps.audit-high.outcome == 'failure'
        run: |
          echo "::warning::pnpm audit found HIGH-severity vulnerabilities in transitive dependencies."
          echo "These require upstream fixes (Docusaurus, theme plugins). Review:" 
          echo "https://github.com/WyattAu/WyattsNotes/security"

  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate MDX (emojis, admonitions, raw HTML)
        run: python3 scripts/validate-mdx.py

      - name: Check relative links
        run: python3 scripts/check-links.py

      - name: Check content depth tiers
        run: python3 scripts/check-depth-tiers.py

      - name: Check description quality
        run: python3 scripts/check-descriptions.py

      - name: Detect hand-wave phrases (informational)
        run: python3 scripts/check-handwaves.py

      - name: Check forward references (informational)
        run: python3 scripts/check-forward-refs.py

      - name: Check search index coverage (informational)
        run: python3 scripts/check-search-index-coverage.py

  links:
    name: Check External Links
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Markdown Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --config .lycheeignore 'docs/**/*.md' 'docs/**/*.mdx' '*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
