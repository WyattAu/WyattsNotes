name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'scripts/**'
      - '*.config.ts'
      - '*.config.js'
      - '.github/workflows/**'
      - 'static/**'
      - 'docusaurus.*.config.ts'
  schedule:
    - cron: '0 3 * * 0' # Weekly Sunday 03:00 UTC

jobs:
  detect:
    name: Detect Change Type
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'
    outputs:
      change-type: ${{ steps.detect.outputs.change-type }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: detect
        run:
          echo "change-type=$(node scripts/detect-change-type.mjs | cut -d= -f2)" >>
          "$GITHUB_OUTPUT"

  dependabot:
    name: Dependabot Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run:
          pnpm exec eslint . --ext .ts,.tsx --max-warnings=0 --ignore-patterns
          'src/plugins/service-worker/package.json' || true
  validate:
    name: Lint & Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect]
    if: needs.detect.outputs.change-type != 'none' || github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: needs.detect.outputs.change-type != 'content'
        run: pnpm exec eslint . --report-unused-disable-directives --ext .js,.jsx,.ts,.tsx

      - name: Typecheck
        if: needs.detect.outputs.change-type != 'content'
        run: pnpm run typecheck

      - name: Cache Docusaurus build
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/docusaurus
          key: docusaurus-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            docusaurus-

      - name: Build
        id: build
        run: pnpm run build

      - name: Check bundle size regression
        if:
          always() && steps.build.outcome == 'success' && needs.detect.outputs.change-type !=
          'content'
        run: node scripts/check-bundle-size.mjs

      - name: Report bundle sizes
        if:
          always() && steps.build.outcome == 'success' && needs.detect.outputs.change-type !=
          'content'
        run: |
          echo "## Bundle Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for dir in build/build-*/; do
            if [ -d "$dir" ]; then
              site=$(basename "$dir" | sed 's/build-//')
              js_size=$(find "$dir" -name '*.js' -exec cat {} + 2>/dev/null | wc -c || echo 0)
              css_size=$(find "$dir" -name '*.css' -exec cat {} + 2>/dev/null | wc -c || echo 0)
              total=$((js_size + css_size))
              echo "- **${site}**: JS $((js_size / 1024)) KB, CSS $((css_size / 1024)) KB, Total $((total / 1024)) KB" >> "$GITHUB_STEP_SUMMARY"
            fi
          done || true

      - name: Build timing
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "::notice::Build succeeded"
          else
            echo "::error::Build failed"
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect]
    if:
      (needs.detect.outputs.change-type != 'none' && needs.detect.outputs.change-type != 'content')
      || github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect]
    if: needs.detect.outputs.change-type == 'dependency' || github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (critical = fail)
        run: pnpm audit --audit-level=critical --ignore tmp

  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate MDX (emojis, admonitions, raw HTML)
        run: python3 scripts/validate-mdx.py

      - name: Check relative links
        run: python3 scripts/check-links.py

      - name: Check content depth tiers (informational)
        run: python3 scripts/check-depth-tiers.py || true

      - name: Check content depth (informational)
        run: python3 scripts/check-content-depth.py docs/ || true

      - name: Check description quality
        run: python3 scripts/check-descriptions.py

      - name: Check description quality gate
        run: node scripts/check-descriptions.mjs

      - name: Detect hand-wave phrases (informational)
        run: python3 scripts/check-handwaves.py

      - name: Check forward references (informational)
        run: python3 scripts/check-forward-refs.py

      - name: Check search index coverage (informational)
        run: python3 scripts/check-search-index-coverage.py || true

  links:
    name: Check External Links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Markdown Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --config .lycheeignore 'docs/**/*.md' 'docs/**/*.mdx' '*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    needs: [validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus site
        run: pnpm run build

      - name: Run Lighthouse CI
        run: pnpm run lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  algolia-index:
    name: Update Algolia Search Index
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if:
      (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.schedule !=
      ''
    needs: [validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect which sites changed
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          SITES=""
          if echo "$CHANGED" | grep -q "docs/docs_ib\|docusaurus\.ib\."; then
            SITES="${SITES},ib"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_dse\|docusaurus\.dse\."; then
            SITES="${SITES},dse"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_alevel\|docusaurus\.alevel"; then
            SITES="${SITES},alevel-maths-physics,alevel-sciences"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_qualifications\|docusaurus\.qualifications\."; then
            SITES="${SITES},qualifications"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_languages\|docs/docs_cpp\|docusaurus\.programming\."; then
            SITES="${SITES},programming"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_university\|docusaurus\.university\."; then
            SITES="${SITES},university"
          fi
          if echo "$CHANGED" | grep -q "docs/docs_infrastructure\|docs/docs_tools\|docusaurus\.config\.ts"; then
            SITES="${SITES},main"
          fi
          # Remove leading comma
          SITES=$(echo "$SITES" | sed 's/^,//')
          if [ -z "$SITES" ]; then
            echo "No content changes detected, skipping Algolia indexing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sites to reindex: $SITES"
            echo "sites=$SITES" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reindex changed sites
        if: steps.changed.outputs.skip != 'true'
        run: node scripts/index-algolia.js
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY: ${{ secrets.ALGOLIA_WRITE_KEY }}
          SITES_FILTER: ${{ steps.changed.outputs.sites }}

      - name: Full reindex (weekly schedule)
        if: github.event.schedule != ''
        run: node scripts/index-algolia.js
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_KEY: ${{ secrets.ALGOLIA_WRITE_KEY }}
