name: Deploy DSE to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_dse/**'
      - 'sidebars/sidebar_dse.ts'
      - 'docusaurus.dse.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - '.github/workflows/deploy-dse.yml'
  workflow_dispatch:

concurrency:
  group: deploy-dse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy DSE
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.dse.config.ts
          project-name: wyattsnotes-dse
          site-name: DSE
          deploy-url: 'https://dse.wyattau.com'
          node-memory: '11264'
          preprocess-paths: 'docs/docs_dse'
          create-project: 'true'
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          google-site-verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          bing-site-verification: ${{ secrets.BING_SITE_VERIFICATION }}
          cloudflare-analytics-token: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
