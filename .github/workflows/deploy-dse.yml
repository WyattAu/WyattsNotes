name: Deploy DSE to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_dse/**'
      - 'sidebars/sidebar_dse.ts'
      - 'docusaurus.dse.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-dse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy DSE
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=16384
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Docusaurus build
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/docusaurus
          key: docusaurus-dse-${ hashFiles('pnpm-lock.yaml') }
          restore-keys: |
            docusaurus-dse-

      - name: Build
        run: npx docusaurus build --config docusaurus.dse.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=11264
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Remove SSR bundle (Cloudflare Pages static-only, 25 MiB file limit)
        run: rm -rf build/__server

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Create Cloudflare Pages project if needed
        run:
          npx wrangler pages project create wyattsnotes-dse --production-branch main 2>/dev/null ||
          true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes-dse
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
