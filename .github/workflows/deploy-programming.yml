name: Deploy Programming to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_cpp/**'
      - 'docs/docs_languages/**'
      - 'sidebars/sidebar_cpp.ts'
      - 'sidebars/sidebar_languages.ts'
      - 'docusaurus.programming.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-programming-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Programming
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=16384
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo sysctl vm.swappiness=100
          free -h

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Preprocess MDX files
        run: node scripts/escape-latex-braces.js docs/docs_cpp docs/docs_languages

      - name: Cache Docusaurus build
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/docusaurus
          key: docusaurus-programming-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            docusaurus-programming-

      - name: Build
        run: npx docusaurus build --config docusaurus.programming.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=7168
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}

      - name: Remove SSR bundle (Cloudflare Pages static-only, 25 MiB file limit)
        run: rm -rf build/__server

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: npx wrangler pages deploy build --project-name wyattsnotes-programming
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        if: always()
        run: node scripts/deploy-summary.mjs
        env:
          SITE_NAME: 'Programming'
          DEPLOY_URL: 'https://programming.wyattau.com'
          BUILD_DURATION: '0'
          GIT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
