name: Deploy Programming to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_cpp/**'
      - 'docs/docs_languages/**'
      - 'sidebars/sidebar_cpp.ts'
      - 'sidebars/sidebar_languages.ts'
      - 'docusaurus.programming.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - '.github/workflows/deploy-programming.yml'
  workflow_dispatch:

concurrency:
  group: deploy-programming-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Programming
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.programming.config.ts
          project-name: wyattsnotes-programming
          site-name: Programming
          deploy-url: 'https://programming.wyattau.com'
          node-memory: '7168'
          preprocess-paths: 'docs/docs_cpp docs/docs_languages'
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          google-site-verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          bing-site-verification: ${{ secrets.BING_SITE_VERIFICATION }}
          cloudflare-analytics-token: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
