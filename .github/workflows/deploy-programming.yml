name: Deploy Programming to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_cpp/**'
      - 'docs/docs_languages/**'
      - 'sidebars/sidebar_cpp.ts'
      - 'sidebars/sidebar_languages.ts'
      - 'docusaurus.programming.config.ts'
      - 'src/pages/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Programming
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: npx docusaurus build --config docusaurus.programming.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=32768
          DOCUSAURUS_NO_PERSISTENT_CACHE: '1'
          DISABLE_LUNR: 'true'

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes-programming
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 26966ba2f4b3a12cb750cd615c8d0bcf
