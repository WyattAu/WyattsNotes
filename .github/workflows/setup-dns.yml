name: Setup DNS Records

on:
  workflow_dispatch:

jobs:
  setup-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=wyattau.com" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].id')
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "Zone ID: $ZONE_ID"

      - name: Create CNAME records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          TARGETS=("ib:wyattsnotes-ib.pages.dev" "dse:wyattsnotes-dse.pages.dev" "alevel-maths-physics:wyattsnotes-alevel-maths-physics.pages.dev" "alevel-sciences:wyattsnotes-alevel-sciences.pages.dev")

          for entry in "${TARGETS[@]}"; do
            sub="${entry%%:*}"
            target="${entry##*:}"
            echo "Creating CNAME: ${sub}.wyattau.com -> ${target}"

            RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"CNAME\",
                \"name\": \"${sub}.wyattau.com\",
                \"content\": \"${target}\",
                \"ttl\": 1,
                \"proxied\": true
              }")

            SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
            ERRORS=$(echo "$RESPONSE" | jq -r '.errors[0].code // empty')

            if [ "$SUCCESS" = "true" ]; then
              echo "  Created successfully"
            elif [ "$ERRORS" = "81057" ]; then
              echo "  Already exists, skipping"
            else
              echo "  Error: $RESPONSE"
              exit 1
            fi
          done
