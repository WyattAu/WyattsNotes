name: Deploy Qualifications to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_qualifications/**'
      - 'sidebars/sidebar_qualifications.ts'
      - 'docusaurus.qualifications.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - '.github/workflows/deploy-qualifications.yml'
  workflow_dispatch:

concurrency:
  group: deploy-qualifications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Qualifications
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.qualifications.config.ts
          project-name: wyattsnotes-qualifications
          site-name: Qualifications
          deploy-url: 'https://qualifications.wyattau.com'
          node-memory: '7168'
          preprocess-paths: 'docs/docs_qualifications'
        secrets: inherit
