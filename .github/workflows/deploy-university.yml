name: Deploy University to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_university/**'
      - 'sidebars/sidebar_university.ts'
      - 'docusaurus.university.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'src/css/**'
      - 'src/plugins/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - 'scripts/generate-university-plugin-config.mjs'
      - '.github/workflows/deploy-university.yml'
  workflow_dispatch:

concurrency:
  group: deploy-university-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=16384
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Preprocess MDX files
        run: node scripts/escape-latex-braces.js docs/docs_university

      - name: Build
        run: npx docusaurus build --config docusaurus.university.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=11264
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}

      - name: Remove SSR bundle
        run: rm -rf build/__server

      - name: Verify build
        run: |
          echo "=== Build directory structure ==="
          find build/docs -maxdepth 2 -type d | sort | head -40
          echo "=== Total HTML pages ==="
          find build/docs -name '*.html' | wc -l

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: npx wrangler@4 pages deploy build --project-name wyattsnotes-university
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        if: always()
        run: node scripts/deploy-summary.mjs
        env:
          SITE_NAME: 'University'
          DEPLOY_URL: 'https://university.wyattau.com'
          BUILD_DURATION: '0'
          GIT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
