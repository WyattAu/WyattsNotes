name: Deploy University to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_university/**'
      - 'sidebars/sidebar_university.ts'
      - 'docusaurus.university.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'src/css/**'
      - 'src/plugins/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - 'scripts/generate-university-plugin-config.mjs'
      - '.github/workflows/deploy-university.yml'
  workflow_dispatch:

concurrency:
  group: deploy-university-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.subject }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - subject: maths
            docs_path: docs/docs_university/mathematics
            include_intro: 'intro'
          - subject: physics
            docs_path: docs/docs_university/physics
          - subject: computing
            docs_path: docs/docs_university/computing
          - subject: admissions
            docs_path: docs/docs_university/admissions
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=16384
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Preprocess MDX files
        run: node scripts/escape-latex-braces.js ${{ matrix.docs_path }}

      - name: Generate per-plugin Docusaurus config
        run:
          node scripts/generate-university-plugin-config.mjs ${{ matrix.subject }} ${{
          matrix.docs_path }} ${{ matrix.include_intro || '' }}

      - name: Build
        run: npx docusaurus build --config docusaurus-university-${{ matrix.subject }}.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=11264
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}

      - name: Remove SSR bundle
        run: rm -rf build/__server

      - uses: actions/upload-artifact@v4
        with:
          name: university-build-${{ matrix.subject }}
          path: build/
          retention-days: 1

  merge-and-deploy:
    name: Merge and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: success()
    steps:
      - uses: actions/checkout@v6

      - name: Download maths build (base with intro + shared assets)
        uses: actions/download-artifact@v4
        with:
          name: university-build-maths
          path: build-maths

      - name: Download physics build
        uses: actions/download-artifact@v4
        with:
          name: university-build-physics
          path: build-physics

      - name: Download computing build
        uses: actions/download-artifact@v4
        with:
          name: university-build-computing
          path: build-computing

      - name: Download admissions build
        uses: actions/download-artifact@v4
        with:
          name: university-build-admissions
          path: build-admissions

      - name: Merge builds
        run: |
          # Use maths as the base (has intro page + shared theme assets)
          mv build-maths build

          # Merge per-subject page directories from other builds
          # Each build puts its pages under build/docs/<routeBasePath>/
          # These directories don't overlap, so we can safely copy them
          cp -rn build-physics/docs build/ 2>/dev/null || true
          cp -rn build-computing/docs build/ 2>/dev/null || true
          cp -rn build-admissions/docs build/ 2>/dev/null || true

          # Verify structure
          echo "=== Build directory structure ==="
          find build/docs -maxdepth 2 -type d | sort | head -30
          echo "=== Total HTML pages ==="
          find build/docs -name '*.html' | wc -l

      - name: Remove SSR bundle
        run: rm -rf build/__server

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: npx wrangler pages deploy build --project-name wyattsnotes-university
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        if: always()
        run: node scripts/deploy-summary.mjs
        env:
          SITE_NAME: 'University'
          DEPLOY_URL: 'https://university.wyattau.com'
          BUILD_DURATION: '0'
          GIT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
