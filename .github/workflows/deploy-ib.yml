name: Deploy IB to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_ib/**'
      - 'sidebars/sidebar_ib.ts'
      - 'docusaurus.ib.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - '.github/workflows/deploy-ib.yml'
  workflow_dispatch:

concurrency:
  group: deploy-ib-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy IB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.ib.config.ts
          project-name: wyattsnotes-ib
          site-name: IB
          deploy-url: 'https://ib.wyattau.com'
          node-memory: '14336'
          preprocess-paths: 'docs/docs_ib'
          create-project: 'true'
        secrets: inherit
