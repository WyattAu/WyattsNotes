name: Deploy A-Levels to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_alevel/**'
      - 'sidebars/sidebar_alevel.ts'
      - 'docusaurus.alevel.config.ts'
      - 'src/pages/**'
      - 'src/css/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy A-Levels
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: npx docusaurus build --config docusaurus.alevel.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=10240
          DOCUSAURUS_NO_PERSISTENT_CACHE: '1'
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes-alevel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 26966ba2f4b3a12cb750cd615c8d0bcf
