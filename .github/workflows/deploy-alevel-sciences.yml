name: Deploy A-Level Sciences to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_alevel/**'
      - 'sidebars/sidebar_alevel*.ts'
      - 'docusaurus.alevel*.config.ts'
      - 'docusaurus.shared.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'src/css/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/escape-latex-braces.js'
      - '.github/workflows/deploy-alevel-sciences.yml'
  workflow_dispatch:

concurrency:
  group: deploy-alevel-sciences-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy A-Level Sciences
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.alevel-sciences.config.ts
          project-name: wyattsnotes-alevel-sciences
          site-name: 'A-Level Sciences'
          deploy-url: 'https://alevel.wyattau.com'
          node-memory: '14336'
          preprocess-paths: 'docs/docs_alevel'
          create-project: 'true'
          allow-build-failure: 'true'
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          google-site-verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          bing-site-verification: ${{ secrets.BING_SITE_VERIFICATION }}
          cloudflare-analytics-token: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
