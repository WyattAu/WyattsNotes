name: Deploy Academics to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-academics.yml'
  workflow_dispatch:

concurrency:
  group: deploy-academics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Academics Redirect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Generate redirect page
        run: |
          mkdir -p build
          cat > build/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Wyatt's Notes — Academics</title>
            <link rel="icon" href="/img/WyattsNotes/WyattsNotesLogo.ico">
            <meta http-equiv="refresh" content="0;url=https://ib.wyattau.com">
            <script>window.location.replace("https://ib.wyattau.com");</script>
          </head>
          <body>
            <p>Redirecting to <a href="https://ib.wyattau.com">ib.wyattau.com</a>...</p>
          </body>
          </html>
          HTMLEOF
          # Cloudflare Pages _redirects for 301 (SEO-friendly)
          echo "/* https://ib.wyattau.com/:splat 301" > build/_redirects

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create Cloudflare Pages project if needed
        run:
          wrangler pages project create wyattsnotes-academics --production-branch main 2>/dev/null
          || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: wrangler pages deploy build --project-name wyattsnotes-academics
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment summary
        if: always()
        run: node scripts/deploy-summary.mjs
        env:
          SITE_NAME: 'Academics'
          DEPLOY_URL: 'https://academics.wyattau.com'
          BUILD_DURATION: '0'
          GIT_SHA: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
