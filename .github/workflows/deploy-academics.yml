name: Deploy Academics to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_ib/**'
      - 'docs/docs_dse/**'
      - 'sidebars/sidebar_ib.ts'
      - 'sidebars/sidebar_dse.ts'
      - 'docusaurus.academics.config.ts'
      - 'src/pages/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Academics
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: npx docusaurus build --config docusaurus.academics.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          DOCUSAURUS_NO_PERSISTENT_CACHE: '1'
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes-academics
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 26966ba2f4b3a12cb750cd615c8d0bcf
