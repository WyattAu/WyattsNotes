name: Lighthouse CI

on:
  workflow_run:
    workflows:
      - Deploy Main Site to Cloudflare Pages
      - Deploy Academics to Cloudflare Pages
      - Deploy A-Levels to Cloudflare Pages
      - Deploy Qualifications to Cloudflare Pages
      - Deploy Programming to Cloudflare Pages
      - Deploy University to Cloudflare Pages
    types: [completed]
    branches: [main]

jobs:
  lighthouse-main:
    name: Lighthouse - Main
    if: github.event.workflow == 'Deploy Main Site to Cloudflare Pages' && github.event.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lighthouse -- --collect.url=https://wyattsnotes.wyattau.com --collect.startServerCommand=""
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-main-results
          path: .lighthouseci

  lighthouse-academics:
    name: Lighthouse - Academics
