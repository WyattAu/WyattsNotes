name: Lighthouse CI

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref_name || 'scheduled' }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows:
      - Deploy Main Site to Cloudflare Pages
      - Deploy Academics to Cloudflare Pages
      - Deploy A-Level Maths & Physics to Cloudflare Pages
      - Deploy A-Level Sciences to Cloudflare Pages
      - Deploy IB to Cloudflare Pages
      - Deploy DSE to Cloudflare Pages
      - Deploy Qualifications to Cloudflare Pages
      - Deploy Programming to Cloudflare Pages
      - Deploy University to Cloudflare Pages
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to test (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - main
          - academics
          - alevel-maths-physics
          - alevel-sciences
          - ib
          - dse
          - qualifications
          - programming
          - university

jobs:
  lighthouse:
    name: Lighthouse - ${{ matrix.name }}
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' &&
        (matrix.trigger == '*' || matrix.trigger == github.event.workflow_run.name)) ||
      (github.event_name == 'workflow_dispatch' && (inputs.site == 'all' || inputs.site == matrix.key))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: main
            name: Main
            url: https://wyattsnotes.wyattau.com
            trigger: Deploy Main Site to Cloudflare Pages
          - key: academics
            name: Academics
            url: https://academics.wyattau.com
            trigger: Deploy Academics to Cloudflare Pages
          - key: alevel-maths-physics
            name: A-Level Maths & Physics
            url: https://alevel.wyattau.com
            trigger: Deploy A-Level Maths & Physics to Cloudflare Pages
          - key: alevel-sciences
            name: A-Level Sciences
            url: https://alevel.wyattau.com
            trigger: Deploy A-Level Sciences to Cloudflare Pages
          - key: ib
            name: IB
            url: https://ib.wyattau.com
            trigger: Deploy IB to Cloudflare Pages
          - key: dse
            name: DSE
            url: https://dse.wyattau.com
            trigger: Deploy DSE to Cloudflare Pages
          - key: qualifications
            name: Qualifications
            url: https://qualifications.wyattau.com
            trigger: Deploy Qualifications to Cloudflare Pages
          - key: programming
            name: Programming
            url: https://programming.wyattau.com
            trigger: Deploy Programming to Cloudflare Pages
          - key: university
            name: University
            url: https://university.wyattau.com
            trigger: Deploy University to Cloudflare Pages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lighthouse -- --collect.url=${{ matrix.url }} --collect.startServerCommand=""
      - name: Lighthouse summary
        if: always()
        run: node scripts/lighthouse-summary.mjs
        env:
          SITE_NAME: ${{ matrix.key }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: lighthouse-${{ matrix.key }}-results
          path: .lighthouseci
          retention-days: 7
