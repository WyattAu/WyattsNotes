name: Lighthouse CI

permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: true

on:
  workflow_run:
    workflows:
      - Deploy Main Site to Cloudflare Pages
      - Deploy Academics to Cloudflare Pages
      - Deploy A-Level Maths & Physics to Cloudflare Pages
      - Deploy A-Level Sciences to Cloudflare Pages
      - Deploy IB to Cloudflare Pages
      - Deploy DSE to Cloudflare Pages
      - Deploy Qualifications to Cloudflare Pages
      - Deploy Programming to Cloudflare Pages
      - Deploy University to Cloudflare Pages
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to test (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - main
          - academics
          - alevel
          - ib
          - dse
          - qualifications
          - programming
          - university

jobs:
  lighthouse-main:
    name: Lighthouse - Main
    if:
      (github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Deploy Main Site to
      Cloudflare Pages' && github.event.workflow_run.conclusion == 'success') || (github.event_name
      == 'workflow_dispatch' && (inputs.site == 'all' || inputs.site == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run:
          pnpm lighthouse -- --collect.url=https://wyattsnotes.wyattau.com
          --collect.startServerCommand=""
      - name: Lighthouse summary
        if: always()
        run: node scripts/lighthouse-summary.mjs
        env:
          SITE_NAME: 'main'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-main-results
          path: .lighthouseci

  lighthouse-academics:
    name: Lighthouse - Academics
