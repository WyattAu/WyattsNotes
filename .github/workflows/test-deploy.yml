name: Test Deployment

on:
  pull_request:
    branches: [main]

jobs:
  test-deploy:
    name: Test Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm exec eslint . --report-unused-disable-directives --ext .js,.jsx,.ts,.tsx

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build production site
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Validate build output
        run: |
          [ -d build ] || (echo "ERROR: Build directory missing"; exit 1)
          [ -f build/index.html ] || (echo "ERROR: No index.html found"; exit 1)
          HTML_FILES=$(find build -name "*.html" | wc -l)
          echo "Build verified: $HTML_FILES HTML files generated"
