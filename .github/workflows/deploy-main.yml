name: Deploy Main Site to Cloudflare Pages

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_infrastructure/**'
      - 'docs/docs_tools/**'
      - 'sidebars/sidebar_infrastructure.ts'
      - 'sidebars/sidebar_tools.ts'
      - 'docusaurus.config.ts'
      - 'src/**'
      - 'static/**'
      - 'blog_release-notes/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy Main Site
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/docusaurus-build
        with:
          config-file: docusaurus.config.ts
          project-name: wyattsnotes
          site-name: Main
          deploy-url: 'https://wyattsnotes.wyattau.com'
          node-memory: '7168'
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          google-site-verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          bing-site-verification: ${{ secrets.BING_SITE_VERIFICATION }}
          cloudflare-analytics-token: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
