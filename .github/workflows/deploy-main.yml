name: Deploy Main Site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_infrastructure/**'
      - 'docs/docs_tools/**'
      - 'sidebars/sidebar_infrastructure.ts'
      - 'sidebars/sidebar_tools.ts'
      - 'docusaurus.config.ts'
      - 'src/**'
      - 'static/**'
      - 'blog_release-notes/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Main Site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168
          DOCUSAURUS_NO_PERSISTENT_CACHE: '1'
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 26966ba2f4b3a12cb750cd615c8d0bcf
