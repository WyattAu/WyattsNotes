name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm exec eslint . --report-unused-disable-directives --ext .js,.jsx,.ts,.tsx

      - name: Typecheck
        run: pnpm run typecheck

      - name: Clean previous builds
        run: pnpm run clear

      - name: Build website
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=12288

      - name: Prepare artifact
        run: |
          touch build/.nojekyll
          echo "Build version: $(git rev-parse --short HEAD) | $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > build/build-info.txt

      - name: Validate build output
        run: |
          [ -d build ] || (echo "ERROR: Build directory missing"; exit 1)
          [ -f build/index.html ] || (echo "ERROR: No index.html found"; exit 1)

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
