name: Deploy A-Level Maths & Physics to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs_alevel/**'
      - 'sidebars/sidebar_alevel*.ts'
      - 'docusaurus.alevel*.config.ts'
      - 'src/pages/**'
      - 'src/theme/**'
      - 'src/components/**'
      - 'src/css/**'
      - 'static/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy A-Level Maths & Physics
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Add swap space
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=32768
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Escape LaTeX braces for MDX
        run: node scripts/escape-latex-braces.js docs/docs_alevel

      - name: Build
        run: npx docusaurus build --config docusaurus.alevel-maths-physics.config.ts
        env:
          NODE_OPTIONS: --max-old-space-size=11264
          DOCUSAURUS_NO_PERSISTENT_CACHE: '1'
          DISABLE_LUNR: 'true'
          GENERATE_SOURCEMAP: 'false'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Install wrangler
        run: pnpm add -D wrangler

      - name: Create Cloudflare Pages project if needed
        run:
          npx wrangler pages project create wyattsnotes-alevel-maths-physics --production-branch
          main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name wyattsnotes-alevel-maths-physics
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
