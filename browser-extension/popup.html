<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Wyatt's Notes Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
    }
    .header {
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header span { opacity: 0.7; font-weight: 400; font-size: 12px; }
    .search-box {
      margin: 12px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .search-box input:focus { border-color: #4a7cff; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 14px;
    }
    .results {
      max-height: 300px;
      overflow-y: auto;
      padding: 0 12px 12px;
    }
    .result-item {
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .result-item:hover { border-color: #4a7cff; }
    .result-title { font-size: 13px; font-weight: 500; color: #1a1a2e; }
    .result-snippet { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.4; }
    .result-subject { font-size: 11px; color: #999; margin-top: 4px; }
    .empty {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    {"Wyatt's Notes"} <span>Search</span>
  </div>
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search notes..." autofocus>
  </div>
  <div class="results" id="results">
    <div class="empty">Type to search across all subjects</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
